# Publish the multi-arch MeshCheck Node agent image to Docker Hub.
#
# This mirrors `make publish`: it cross-compiles the agent for amd64 + arm64 +
# armv7 (offline, from the committed vendor/ tree), assembles one multi-arch
# manifest list, and pushes it to Docker Hub under the rolling `:agent` tag and
# the version-pinned `:agent-<VERSION>` tag (from the VERSION file). The target
# repository is AGENT_REPO in the Makefile (s4l3h1/meshcheck).
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  Docker Hub account that owns the target repo (s4l3h1)
#   DOCKERHUB_TOKEN     Docker Hub access token with read/write/delete scope
name: Publish agent image

on:
  # Every merge to main refreshes the published images.
  push:
    branches: [main]
  # Allow a manual re-publish from the Actions tab.
  workflow_dispatch:

# Never run two publishes concurrently; don't interrupt a push already in flight.
concurrency:
  group: publish-agent-image
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # docker-container driver so `make build`'s `--output dist` export and the
      # multi-arch manifest push both work.
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Cross-compile (offline, from vendor/) and push the multi-arch image.
      # BUILDX_BUILDER points `make build`'s plain `docker build` at the
      # docker-container builder above (replaces the deprecated install: true).
      - name: Build and publish the agent image
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: make publish
